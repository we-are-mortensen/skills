<!--
  Variant sidebar — design-time only.

  Include this snippet ONCE in the project's layout (BaseLayout.astro / base.html),
  behind a dev gate so it never reaches production:

    🅐 Astro:
       {(import.meta.env.DEV || Astro.url.searchParams.has('devtools')) && (
         <Fragment set:html={variantSidebarHtml} />
       )}
       <script src="/scripts/variant-sidebar.js" defer />

    🅥 Vite (posthtml-expressions):
       {{#if env.DEV || query.devtools}}
         <include src="components/_dev/variant-sidebar.html"></include>
         <script src="/scripts/variant-sidebar.js" defer></script>
       {{/if}}

  The script reads every [data-variant-key] block on the page, builds the
  collapsible panel, and handles URL-param-driven visibility toggling.

  No external CSS — the panel's own styles are scoped inline below so they
  never collide with project tokens. The chip uses a small dev-tool palette
  (slate / sky) rather than any project token.
-->

<style data-variant-sidebar>
  [data-variant-sidebar] {
    position: fixed;
    right: 1rem;
    bottom: 1rem;
    z-index: 2147483646;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    color: #0f172a;
  }
  [data-variant-sidebar] * { box-sizing: border-box; }
  [data-variant-sidebar] .vs-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0.875rem;
    border-radius: 9999px;
    background: #0f172a;
    color: #f8fafc;
    border: 0;
    font-size: 0.8125rem;
    font-weight: 600;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.18);
  }
  [data-variant-sidebar] .vs-chip:focus-visible {
    outline: 2px solid #38bdf8;
    outline-offset: 2px;
  }
  [data-variant-sidebar] .vs-chip-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 1.25rem;
    height: 1.25rem;
    padding: 0 0.375rem;
    border-radius: 9999px;
    background: #38bdf8;
    color: #0f172a;
    font-size: 0.6875rem;
  }
  [data-variant-sidebar] .vs-panel {
    position: absolute;
    right: 0;
    bottom: calc(100% + 0.5rem);
    width: 18rem;
    max-height: 70vh;
    overflow-y: auto;
    padding: 0.875rem;
    border-radius: 0.75rem;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    box-shadow: 0 24px 48px rgba(15, 23, 42, 0.18);
  }
  [data-variant-sidebar][data-collapsed="true"] .vs-panel { display: none; }
  [data-variant-sidebar] .vs-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.625rem;
  }
  [data-variant-sidebar] .vs-title {
    margin: 0;
    font-size: 0.8125rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: #64748b;
  }
  [data-variant-sidebar] .vs-reset {
    border: 0;
    background: transparent;
    color: #0ea5e9;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    padding: 0;
  }
  [data-variant-sidebar] .vs-empty {
    margin: 0;
    padding: 0.5rem 0;
    font-size: 0.8125rem;
    color: #94a3b8;
  }
  [data-variant-sidebar] .vs-row {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    margin-bottom: 0.625rem;
  }
  [data-variant-sidebar] .vs-row:last-child { margin-bottom: 0; }
  [data-variant-sidebar] .vs-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: #334155;
  }
  [data-variant-sidebar] .vs-select {
    appearance: none;
    width: 100%;
    padding: 0.4375rem 0.625rem;
    border: 1px solid #cbd5e1;
    border-radius: 0.375rem;
    background: #f8fafc;
    font-size: 0.8125rem;
    color: #0f172a;
    cursor: pointer;
  }
  [data-variant-sidebar] .vs-select:focus-visible {
    outline: 2px solid #38bdf8;
    outline-offset: 1px;
  }
</style>

<div data-variant-sidebar data-collapsed="true" aria-live="polite">
  <button type="button" class="vs-chip" data-vs-toggle aria-expanded="false">
    <span aria-hidden="true">🎛</span>
    <span>Variants</span>
    <span class="vs-chip-count" data-vs-count>0</span>
  </button>
  <div class="vs-panel" role="region" aria-label="Variant selector">
    <div class="vs-header">
      <p class="vs-title">Variants on this page</p>
      <button type="button" class="vs-reset" data-vs-reset>Reset</button>
    </div>
    <div data-vs-rows>
      <p class="vs-empty">No variant-aware blocks on this page.</p>
    </div>
  </div>
</div>
